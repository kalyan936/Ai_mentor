<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="AI Mentor - Adaptive AI Learning Platform for Python, ML, DL, NLP, GenAI & Agentic AI">
    <meta name="theme-color" content="#0F172A">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AI Mentor - Adaptive Learning Platform</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h1 class="logo">🧠 <span class="gradient-text">AI Mentor</span></h1>
            <p class="logo-sub">Adaptive AI Learning</p>
        </div>
        <div id="sidebar-user" class="sidebar-user hidden">
            <div class="user-avatar" id="user-avatar">L</div>
            <span id="sidebar-name">Learner</span>
        </div>
        <nav id="sidebar-nav" class="sidebar-nav hidden">
            <a href="#dashboard" class="nav-item active" data-page="dashboard">
                <span class="nav-icon">🏠</span> Dashboard
            </a>
            <a href="#roadmap" class="nav-item" data-page="roadmap">
                <span class="nav-icon">🗺️</span> Roadmap
            </a>
            <a href="#lessons" class="nav-item" data-page="lessons">
                <span class="nav-icon">📖</span> Lessons
            </a>
            <a href="#tutor" class="nav-item" data-page="tutor">
                <span class="nav-icon">💬</span> AI Tutor
            </a>
            <a href="#quiz" class="nav-item" data-page="quiz">
                <span class="nav-icon">📝</span> Quiz Arena
            </a>
            <a href="#coding" class="nav-item" data-page="coding">
                <span class="nav-icon">💻</span> Code Lab
            </a>
            <a href="#debug" class="nav-item" data-page="debug">
                <span class="nav-icon">🐛</span> Debug Helper
            </a>
            <a href="#projects" class="nav-item" data-page="projects">
                <span class="nav-icon">🔨</span> Projects
            </a>
            <a href="#analytics" class="nav-item" data-page="analytics">
                <span class="nav-icon">📊</span> Analytics
            </a>
            <a href="#settings" class="nav-item" data-page="settings">
                <span class="nav-icon">⚙️</span> Settings
            </a>
        </nav>
        <div id="sidebar-streak" class="sidebar-streak hidden">
            <span class="streak-fire">🔥</span>
            <span id="streak-count">0</span> day streak
        </div>
        <button id="logout-btn" class="btn-logout hidden" onclick="logout()">🚪 Logout</button>
    </aside>

    <!-- Mobile Header -->
    <header id="mobile-header" class="mobile-header">
        <button class="hamburger" onclick="toggleSidebar()">☰</button>
        <span class="gradient-text">AI Mentor</span>
        <span id="mobile-streak" class="mobile-streak">🔥 0</span>
    </header>

    <!-- Main Content -->
    <main id="main-content" class="main-content">
        <!-- Pages are rendered here by JavaScript -->
        <div id="page-container"></div>
    </main>

    <!-- Toast Notification -->
    <div id="toast" class="toast hidden"></div>

    <!-- Loading Overlay -->
    <div id="loading" class="loading-overlay hidden">
        <div class="loading-spinner">
            <div class="spinner"></div>
            <p id="loading-text">AI is thinking...</p>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/db.js"></script>
    <script src="js/llm.js"></script>
    <script src="js/agents.js"></script>
    <script src="js/components.js"></script>
    <script src="js/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    </script>
</body>
</html>
